name: Source monitor (weekly)

on:
  schedule:
    # Sundays 9pm ET. GitHub crons are UTC-only and don't follow DST.
    # 01:00 UTC Monday = 9pm ET Sunday during DST, 8pm ET outside DST.
    # We accept the one-hour DST drift as the cost of a single cron line.
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the agent can branch and push
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      - name: Register state.json merge driver
        # .gitattributes declares `agent/state.json merge=statejson`; the
        # driver lives in repo state and must be registered per-environment.
        # Catches rebases the agent does on the runner. GitHub's server-side
        # "Update branch" button runs outside this env so it cannot use the
        # driver — that case is covered by self-heal in agent/repair_state.py
        # (called from load_state) and the validate-state PR check.
        run: git config merge.statejson.driver "python agent/repair_state.py --merge-driver %O %A %B"

      - name: Run source monitor
        id: monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.event.repository.default_branch }}
          MONITOR_SUMMARY_PATH: ${{ github.workspace }}/monitor-summary.md
        run: python agent/monitor.py

      - name: Upload summary as artifact
        if: always() && hashFiles('monitor-summary.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: monitor-summary
          path: ${{ github.workspace }}/monitor-summary.md
          retention-days: 90

      - name: Open status issue
        if: always() && hashFiles('monitor-summary.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY_PATH: ${{ github.workspace }}/monitor-summary.md
          HAD_CHANGES: ${{ steps.monitor.outputs.had_changes }}
          PR_COUNT: ${{ steps.monitor.outputs.pr_count }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          if [ "${HAD_CHANGES:-false}" = "true" ]; then
            TITLE="Weekly monitor (${DATE}) — review needed (${PR_COUNT:-0} PR(s))"
          else
            TITLE="Weekly monitor (${DATE}) — clean"
          fi

          # Ensure the status label exists. gh issue create --label fails hard
          # if the label is missing, so create it idempotently first.
          gh label create monitor-status \
            --color ededed \
            --description "Weekly source-monitor status issues" \
            2>/dev/null || true

          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body-file "$SUMMARY_PATH" \
            --label monitor-status)

          echo "Opened: $ISSUE_URL"

          # Auto-close clean-week issues so they don't pile up. Errors and
          # PR-bearing runs stay open until you ack them.
          if [ "${HAD_CHANGES:-false}" != "true" ]; then
            gh issue close "$ISSUE_URL" --comment "Auto-closed: clean week, no review needed."
          fi

      - name: Check email is configured
        id: mail_configured
        if: always()
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          if [ -n "${MAIL_USERNAME:-}" ] && [ -n "${MAIL_PASSWORD:-}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MAIL_USERNAME / MAIL_PASSWORD secrets not set; skipping email step."
          fi

      - name: Email summary
        if: always() && steps.mail_configured.outputs.ok == 'true' && hashFiles('monitor-summary.md') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Source Monitor <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_USERNAME }}
          subject: "[responsible-clinical-ai] Weekly monitor — ${{ steps.monitor.outputs.had_changes == 'true' && 'review needed' || 'clean' }}"
          body: file://${{ github.workspace }}/monitor-summary.md
          convert_markdown: true
