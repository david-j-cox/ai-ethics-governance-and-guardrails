    type: html
    cadence: weekly
    applies_to:
      - architecture/deployment.md
    notes: |
      AWS HIPAA-eligible services list. Bedrock model coverage evolves.

  - id: google-cloud-hipaa
    url: https://cloud.google.com/security/compliance/hipaa
    type: html
    cadence: weekly
    applies_to:
      - architecture/deployment.md
    notes: |
      Google Cloud HIPAA scope including Vertex AI.

  - id: azure-openai-hipaa
    url: https://learn.microsoft.com/en-us/azure/foundry/responsible-ai/openai/data-privacy
